<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>.</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: rgba(20, 22, 36, 0.85);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  user-select: none; -webkit-user-select: none;
  overflow: hidden;
}
.indicator {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 16px;
  background: rgba(0,0,0,0.65);
  border-radius: 30px;
  border: 1px solid rgba(255,255,255,0.12);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  width: fit-content;
}
.dot {
  width: 12px; height: 12px; border-radius: 50%;
  background: #e63946; animation: pulse 0.8s infinite;
}
.text { color: #fff; font-size: 14px; font-weight: 500; white-space: nowrap; }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
</style>
</head>
<body>
<div class="indicator">
  <div class="dot"></div>
  <span class="text" id="label">🎙️ <span id="timer">0.0s</span></span>
</div>
<script>
const { listen } = window.__TAURI__?.event || {};
if (listen) {
  listen('update-timer', (e) => {
    const el = document.getElementById('timer');
    if (el && e.payload?.timer) el.textContent = e.payload.timer;
  });
}
</script>
</body>
</html>
