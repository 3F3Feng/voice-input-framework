name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          python -m pip install --upgrade pip
          pip install pytest pynput xvfb

      - name: Install dependencies
        if: matrix.os != 'ubuntu-latest'
        run: |
          python -m pip install --upgrade pip
          pip install pytest pynput

      - name: Run tests (Ubuntu with Xvfb)
        if: matrix.os == 'ubuntu-latest'
        run: |
          xvfb-run --auto-servernum pytest tests/ -v --tb=short

      - name: Run tests
        if: matrix.os != 'ubuntu-latest'
        run: |
          pytest tests/ -v --tb=short

      - name: Run linting
        run: |
          pip install black ruff
          black --check client/ server/ shared/ tests/ || true
          ruff check client/ server/ shared/ tests/ || true

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install linting tools
        run: |
          python -m pip install --upgrade pip
          pip install black ruff mypy

      - name: Run black
        run: |
          black --check client/ server/ shared/ tests/ || true

      - name: Run ruff
        run: |
          ruff check client/ server/ shared/ tests/ || true
