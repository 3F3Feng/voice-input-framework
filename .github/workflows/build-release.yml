name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    outputs:
      version: ${{ steps.version.outputs.VERSION }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Get version
        id: version
        shell: pwsh
        run: |
          $versionLine = Select-String -Path "client/__init__.py" -Pattern '__version__\s*=\s*"([^"]+)"'
          $version = $versionLine.Matches.Groups[1].Value
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT
          echo "Version: $version"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install numpy pynput sounddevice websockets httpx pyautogui pyperclip PySimpleGUI pystray Pillow winotify

      - name: Build with PyInstaller
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.VERSION }}"
          pyinstaller --name "VoiceInput-v$version" --windowed --onefile --add-data "client;client" --add-data "shared;shared" --hidden-import=client.hotkey_manager --hidden-import=client.tray_manager --hidden-import=client.floating_indicator --hidden-import=client.config_manager --hidden-import=client.notifier --hidden-import=client.update_checker --hidden-import=shared.data_types --hidden-import=shared.protocol --hidden-import=numpy --hidden-import=pynput --hidden-import=pynput.keyboard --hidden-import=pynput.keyboard._win32 --hidden-import=pynput.mouse --hidden-import=sounddevice --hidden-import=websockets --hidden-import=websockets.client --hidden-import=httpx --hidden-import=httpx._client --hidden-import=httpcore --hidden-import=pyautogui --hidden-import=pyperclip --hidden-import=PySimpleGUI --hidden-import=h11 --hidden-import=certifi --hidden-import=pystray --hidden-import=PIL --hidden-import=PIL.Image --hidden-import=winotify --collect-all=numpy --collect-all=pynput --collect-all=sounddevice --collect-all=websockets --collect-all=httpx --collect-all=PIL run_client.py

      - name: Rename output
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.VERSION }}"
          $src = "dist/VoiceInput-v$version.exe"
          $dst = "dist/VoiceInput-v$version-windows-x64.exe"
          if (Test-Path $src) {
            Move-Item $src $dst -Force
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: dist/*.exe
          retention-days: 30

  release:
    needs: build-windows
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-build
          path: dist

      - name: Get version from tag
        id: version
        run: |
          version="${GITHUB_REF#refs/tags/v}"
          echo "VERSION=$version" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.exe
          generate_release_notes: true
          body: |
            ## Voice Input Framework

            ### 使用方法
            1. 下载 exe 文件
            2. 运行程序
            3. 按住快捷键说话，松开后自动输入
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
