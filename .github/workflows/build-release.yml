name: Build and Release

on:
  push:
    tags:
      - 'v*'
    branches:
      - main
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller websockets sounddevice pyperclip PySimpleGUI
          
      - name: Build with PyInstaller
        shell: pwsh
        run: |
          pyinstaller --name VoiceInputFramework --windowed --onefile --hidden-import=websockets --hidden-import=sounddevice --hidden-import=pyperclip --hidden-import=PySimpleGUI client/gui.py
          
      - name: List output
        shell: pwsh
        run: |
          Get-ChildItem -Path "dist" -Filter "*.exe" | ForEach-Object { Write-Host $_.FullName }
          if (Test-Path "dist/VoiceInputFramework.exe") {
            Copy-Item "dist/VoiceInputFramework.exe" "dist/VoiceInputFramework-windows-x64.exe"
          }
          
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: VoiceInputFramework-windows-x64
          path: dist/VoiceInputFramework-windows-x64.exe
          retention-days: 30
          
  release:
    needs: build-windows
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/**/*.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
