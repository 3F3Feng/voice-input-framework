name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install numpy pynput sounddevice websockets httpx pyautogui pyperclip PySimpleGUI pystray Pillow

      - name: Build with PyInstaller
        shell: pwsh
        run: |
          pyinstaller --name VoiceInputFramework `
            --windowed `
            --onefile `
            --add-data "client;client" `
            --add-data "shared;shared" `
            --hidden-import=client.hotkey_manager `
            --hidden-import=client.tray_manager `
            --hidden-import=client.floating_indicator `
            --hidden-import=client.config_manager `
            --hidden-import=shared.data_types `
            --hidden-import=shared.protocol `
            --hidden-import=numpy `
            --hidden-import=pynput `
            --hidden-import=pynput.keyboard `
            --hidden-import=pynput.keyboard._win32 `
            --hidden-import=pynput.mouse `
            --hidden-import=sounddevice `
            --hidden-import=websockets `
            --hidden-import=websockets.client `
            --hidden-import=httpx `
            --hidden-import=httpx._client `
            --hidden-import=httpcore `
            --hidden-import=pyautogui `
            --hidden-import=pyperclip `
            --hidden-import=PySimpleGUI `
            --hidden-import=h11 `
            --hidden-import=certifi `
            --hidden-import=pystray `
            --hidden-import=PIL `
            --hidden-import=PIL.Image `
            --collect-all=numpy `
            --collect-all=pynput `
            --collect-all=sounddevice `
            --collect-all=websockets `
            --collect-all=httpx `
            --collect-all=PIL `
            run_client.py

      - name: Rename output
        shell: pwsh
        run: |
          if (Test-Path "dist/VoiceInputFramework.exe") {
            Copy-Item "dist/VoiceInputFramework.exe" "dist/VoiceInputFramework-windows-x64.exe"
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: VoiceInputFramework-windows-x64
          path: dist/VoiceInputFramework-windows-x64.exe
          retention-days: 30

  release:
    needs: build-windows
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
