name: Build and Release

on:
  push:
    tags:
      - 'v*'
    branches:
      - main
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v1.0.0)'
        required: false
        type: string

jobs:
  build-windows:
    runs-on: windows-latest
    strategy:
      matrix:
        include:
          - arch: x64
            name: windows-x64
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          architecture: ${{ matrix.arch }}
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller websockets sounddevice pyperclip PySimpleGUI
          
      - name: Build with PyInstaller
        run: |
          pyinstaller --name VoiceInputFramework `
            --windowed `
            --onefile `
            --add-binary "C:/hostedtoolcache/Python/3.11.9/${{ matrix.arch }}/python.exe;." `
            --hidden-import=websockets `
            --hidden-import=sounddevice `
            --hidden-import=pyperclip `
            --hidden-import=PySimpleGUI `
            --collect-all=PySimpleGUI `
            client/gui.py
          
      - name: Move output
        run: |
          mkdir -p dist
          if (Test-Path "dist/VoiceInputFramework.exe") {
            Move-Item "dist/VoiceInputFramework.exe" "dist/VoiceInputFramework-${{ matrix.name }}.exe"
          }
          Get-ChildItem -Path "dist" -Filter "*.exe" | ForEach-Object { Write-Host $_.FullName }
          
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: VoiceInputFramework-${{ matrix.name }}
          path: dist/VoiceInputFramework-${{ matrix.name }}.exe
          retention-days: 30
          
  release:
    needs: build-windows
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/**/*.exe
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Upload to GitHub Release
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: artifacts/VoiceInputFramework-windows-x64/VoiceInputFramework-windows-x64.exe
          asset_name: VoiceInputFramework-windows-x64.exe
          asset_content_type: application/octet-stream
        if: startsWith(github.ref, 'refs/tags/v')
