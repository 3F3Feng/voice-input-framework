name: Build Tauri Client
on:
  push:
    branches: [dev/llm-postprocessing-v2]
    paths:
      - 'gui/**'
      - '.github/workflows/build.yml'
  pull_request:
    branches: [dev/llm-postprocessing-v2]
    paths:
      - 'gui/**'
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            bundle: deb,AppImage
          - os: macos-latest
            target: aarch64-apple-darwin
            bundle: dmg
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bundle: msi
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    defaults:
      run:
        working-directory: gui
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: gui/package-lock.json

      - name: Install npm dependencies
        run: npm ci

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: gui/src-tauri -> target

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        id: build
        with:
          projectPath: gui
          bundleIdentifier: com.voiceinput.app
          tauriScript: npm run tauri
          args: --target ${{ matrix.target }}
          includeDebug: false
          includeRelease: false

      - name: List build output (Windows debug)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Write-Host "=== Searching for MSI ==="
          Get-ChildItem -Path gui\src-tauri\target -Recurse -Filter *.msi -ErrorAction SilentlyContinue | ForEach-Object { Write-Host $_.FullName }
          Write-Host "=== Searching for EXE (bundle) ==="
          Get-ChildItem -Path gui\src-tauri\target -Recurse -Filter *.exe -ErrorAction SilentlyContinue | Where-Object { $_.FullName -match 'bundle' } | ForEach-Object { Write-Host $_.FullName }
          Write-Host "=== Bundle directory listing ==="
          Get-ChildItem -Path gui\src-tauri\target -Recurse -Directory -Filter bundle -ErrorAction SilentlyContinue | ForEach-Object {
            Write-Host $_.FullName
            Get-ChildItem $_.FullName -Recurse | ForEach-Object { Write-Host "  $_" }
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: voice-input-${{ matrix.target }}
          path: |
            gui/src-tauri/target/${{ matrix.target }}/release/bundle/**/*
            gui/src-tauri/target/release/bundle/**/*
            gui/src-tauri/target/*/release/bundle/**/*
          if-no-files-found: warn
          retention-days: 30
